<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; script-src 'unsafe-inline'; frame-src 'self'; base-uri 'none'">
<meta name="referrer" content="no-referrer">
<meta name="description" content="The case for steady Decor Set Store releases in Top War, presented seven ways: an editorial brief, a data dashboard, a visual story, an executive memo, a product scorecard, a financial ledger, and the voice of the paying players.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23e7b24a'/%3E%3Ccircle cx='16' cy='16' r='10' fill='none' stroke='%23a8761f' stroke-width='1.4'/%3E%3Cpath d='M16 9v14M11.5 13h7a2.5 2.5 0 010 5h-7' fill='none' stroke='%237a5410' stroke-width='2.4' stroke-linecap='round'/%3E%3C/svg%3E">
<title>The Decor Set Store: Four Views of One Case</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bar:#0c0d10; --bar2:#15171c; --line:#262a31; --line2:#363c46;
  --text:#e8eaef; --muted:#8b93a1; --gold:#e7b24a; --accent:#79c0ff;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bar);color:var(--text);font-family:'IBM Plex Mono',ui-monospace,monospace;display:flex;flex-direction:column;overflow:hidden}

/* top bar */
.bar{flex:none;background:linear-gradient(180deg,#101216,#0b0c0f);border-bottom:1px solid var(--line);box-shadow:0 6px 24px rgba(0,0,0,.35);position:relative;z-index:2}
.bar-in{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:18px;padding:10px 18px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;flex:none}
.brand .coin{width:24px;height:24px;flex:none}
.brand .wm{font-family:'Fraunces',serif;font-weight:700;font-size:16px;letter-spacing:-.01em;color:#fff;line-height:1}
.brand .wm small{display:block;font-family:'IBM Plex Mono',monospace;font-weight:400;font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:2px}

.tabs{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.tab{appearance:none;flex:0 0 auto;border:1px solid var(--line2);background:var(--bar2);color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:500;padding:8px 13px 7px;border-radius:9px;cursor:pointer;display:flex;flex-direction:column;gap:1px;line-height:1.25;transition:all .16s;text-align:left;min-width:0}
.tab .n{font-size:8.5px;letter-spacing:.16em;color:var(--muted);opacity:.8}
.tab .t{font-size:13px;color:var(--text);font-weight:600;white-space:nowrap}
.tab .d{font-size:9.5px;color:var(--muted);white-space:nowrap}
.tab:hover{border-color:var(--accent);color:var(--text)}
.tab.on{background:var(--gold);border-color:var(--gold)}
.tab.on .n,.tab.on .t,.tab.on .d{color:#241a06}
.tab.on .n{opacity:.65}

/* stage */
.stage{flex:1;position:relative;background:#0a0a0c}
.stage iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#0a0a0c}
.stage iframe[hidden]{display:none}
.loader{position:absolute;inset:0;display:grid;place-items:center;color:var(--muted);font-size:12px;letter-spacing:.1em;text-transform:uppercase;pointer-events:none;opacity:0;transition:opacity .2s}
.loader.on{opacity:1}

@media(max-width:640px){
  .brand .wm small{display:none}
  .tabs{width:100%;margin-left:0;overflow-x:auto;flex-wrap:nowrap;padding-bottom:2px}
  .tab .d{display:none}
}
</style>
</head>
<body>
  <div class="bar">
    <div class="bar-in">
      <div class="brand">
        <svg class="coin" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" fill="#e7b24a"/><circle cx="16" cy="16" r="10" stroke="#a8761f" stroke-width="1.3" fill="none"/><path d="M16 9v14M11.5 13h7a2.5 2.5 0 010 5h-7" stroke="#7a5410" stroke-width="2.2" stroke-linecap="round" fill="none"/></svg>
        <div class="wm">Decor Set Store<small>Seven views, one case</small></div>
      </div>
      <div class="tabs" id="tabs"></div>
    </div>
  </div>
  <div class="stage" id="stage">
    <div class="loader" id="loader">Loading view</div>
  </div>

<script>
const VERSIONS = [
  { key:'brief',    label:'The Brief',     file:'brief.html',    desc:'Editorial strategy brief' },
  { key:'terminal', label:'The Data Room', file:'terminal.html', desc:'Quant dashboard' },
  { key:'story',    label:'The Story',     file:'story.html',     desc:'Visual scrollytelling' },
  { key:'memo',     label:'The Memo',      file:'memo.html',      desc:'Executive one-pager' },
  { key:'pm',       label:'The Scorecard', file:'pm.html',        desc:'For the product manager' },
  { key:'exec',     label:'The Ledger',    file:'exec.html',      desc:'For the executive' },
  { key:'whale',    label:'The Spender',   file:'whale.html',     desc:'For the paying players' },
];

const stage = document.getElementById('stage');
const tabsEl = document.getElementById('tabs');
const loader = document.getElementById('loader');
const frames = {};

function pickInitial(){
  const q = new URLSearchParams(location.search).get('v');
  if (q && VERSIONS.some(v=>v.key===q)) return q;
  try { const s = localStorage.getItem('decorcase_v'); if (s && VERSIONS.some(v=>v.key===s)) return s; } catch(e){}
  return 'brief';
}

function show(key){
  // lazy create the iframe the first time a view is opened
  if(!frames[key]){
    const v = VERSIONS.find(x=>x.key===key);
    const f = document.createElement('iframe');
    f.title = v.label;
    f.loading = 'eager';
    loader.classList.add('on');
    f.addEventListener('load', ()=>loader.classList.remove('on'), { once:true });
    f.src = v.file;
    stage.appendChild(f);
    frames[key] = f;
  }
  // toggle visibility
  Object.keys(frames).forEach(k=>{ frames[k].hidden = (k!==key); });
  // active tab
  [...tabsEl.children].forEach(b=>b.classList.toggle('on', b.dataset.key===key));
  // persist + url + title
  try { localStorage.setItem('decorcase_v', key); } catch(e){}
  const url = new URL(location.href); url.searchParams.set('v', key);
  history.replaceState(null,'',url);
  const v = VERSIONS.find(x=>x.key===key);
  document.title = 'Decor Set Store: ' + v.label;
}

// build tabs
VERSIONS.forEach((v,i)=>{
  const b = document.createElement('button');
  b.className = 'tab'; b.dataset.key = v.key;
  b.innerHTML = '<span class="n">0'+(i+1)+'</span><span class="t">'+v.label+'</span><span class="d">'+v.desc+'</span>';
  b.addEventListener('click', ()=>show(v.key));
  tabsEl.appendChild(b);
});

// number-key shortcuts 1 to 7
addEventListener('keydown', e=>{
  const n = parseInt(e.key,10);
  if(n>=1 && n<=VERSIONS.length && !e.metaKey && !e.ctrlKey && !e.altKey){ show(VERSIONS[n-1].key); }
});

show(pickInitial());
</script>
</body>
</html>
